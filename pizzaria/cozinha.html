<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,minimum-scale=1">
<title>Cozinha — Pizzaria</title>
<meta name="theme-color" content="#0d0d0d">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Cozinha">
<link rel="manifest" href="/cozinha-manifest.json">
<link rel="apple-touch-icon" href="/cozinha-icon.png">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, sans-serif; background: #0d0d0d; color: #f0f0f0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
  header { background: #111; border-bottom: 2px solid #D62828; padding: 12px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  header h1 { font-size: 20px; font-weight: 900; color: #D62828; }
  .relogio { font-size: 26px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .dot { width: 9px; height: 9px; border-radius: 50%; background: #f87171; display: inline-block; margin-left: 8px; }
  .dot.ok { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .cols { display: grid; grid-template-columns: 1fr 1fr 1fr; flex: 1; min-height: 0; }
  .col { border-right: 1px solid #1f1f1f; display: flex; flex-direction: column; overflow: hidden; }
  .col:last-child { border-right: none; }
  .col-hdr { padding: 10px 14px; font-size: 11px; font-weight: 800; text-transform: uppercase; letter-spacing: 1.5px; border-bottom: 1px solid #1f1f1f; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
  .col-pendente .col-hdr  { color: #f59e0b; }
  .col-preparando .col-hdr { color: #ea580c; }
  .col-pronto .col-hdr    { color: #4ade80; }
  .col-n { background: currentColor; color: #000; border-radius: 20px; padding: 1px 8px; font-size: 12px; font-weight: 900; }
  .cards { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 8px; }
  .card { background: #1a1a1a; border-radius: 10px; padding: 12px 14px; border-left: 4px solid #333; }
  .col-pendente   .card { border-left-color: #f59e0b; }
  .col-preparando .card { border-left-color: #ea580c; }
  .col-pronto     .card { border-left-color: #4ade80; }
  .cn { font-size: 20px; font-weight: 900; }
  .cm { font-size: 12px; color: #888; margin-top: 2px; }
  .itens { list-style: none; margin: 10px 0; }
  .itens li { font-size: 13px; padding: 4px 0; border-bottom: 1px solid #222; display: flex; gap: 8px; }
  .itens li:last-child { border-bottom: none; }
  .qtd { background: #D62828; color: #fff; border-radius: 5px; padding: 1px 7px; font-size: 11px; font-weight: 900; flex-shrink: 0; }
  .btn-acao { width: 100%; border: none; border-radius: 7px; padding: 9px; font-size: 13px; font-weight: 800; cursor: pointer; margin-top: 8px; }
  .btn-prep { background: #ea580c; color: #fff; }
  .btn-pron { background: #16a34a; color: #fff; }
  .btn-entr { background: #1d4ed8; color: #fff; }
  .vazio { text-align: center; padding: 40px 20px; color: #444; font-size: 13px; }
</style>

<script>
// ── Bloqueia F5 e Ctrl+R (atualização de página) ──
(function(){
  document.addEventListener('keydown', function(e){
    const f5    = e.key === 'F5';
    const ctrlR = (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'r';
    if(f5 || ctrlR){ e.preventDefault(); e.stopPropagation(); }
  }, true);
  window.addEventListener('beforeunload', function(e){
    e.preventDefault(); e.returnValue = '';
  });
})();
</script>
</head>
<body>
<header>
  <h1>🍕 COZINHA <span class="dot" id="dot"></span></h1>
  <div class="relogio" id="relogio">00:00</div>
</header>

<div class="cols">
  <div class="col col-pendente">
    <div class="col-hdr">⏳ Aguardando <span class="col-n" id="n-pendente">0</span></div>
    <div class="cards" id="col-pendente"></div>
  </div>
  <div class="col col-preparando">
    <div class="col-hdr">🔥 Preparando <span class="col-n" id="n-preparando">0</span></div>
    <div class="cards" id="col-preparando"></div>
  </div>
  <div class="col col-pronto">
    <div class="col-hdr">✅ Prontos <span class="col-n" id="n-pronto">0</span></div>
    <div class="cards" id="col-pronto"></div>
  </div>
</div>
<script>
let pedidos = [];

// Relógio
function tick(){ const n=new Date(); document.getElementById('relogio').textContent=n.getHours().toString().padStart(2,'0')+':'+n.getMinutes().toString().padStart(2,'0'); }
tick(); setInterval(tick, 10000);

let _cardapioCat = {}; // id -> categoria

async function _initCardapio(){
  try{
    const r = await fetch('/api/cardapio');
    const items = await r.json();
    items.forEach(it => { _cardapioCat[it.id] = it.categoria || ''; });
  }catch(e){}
}

function _vaiCozinha(item){
  const cat = _cardapioCat[item.id] || '';
  return !/bebidas?/i.test(cat);
}

async function carregar(){
  try{
    const r = await fetch('/api/pedidos');
    pedidos = await r.json();
    document.getElementById('dot').classList.add('ok');
    render();
  }catch{
    document.getElementById('dot').classList.remove('ok');
  }
}

function render(){
  ['pendente','preparando','pronto'].forEach(status=>{
    const lista = pedidos
      .filter(p=>p.status===status)
      .filter(p=>(p.itens||[]).some(i=>_vaiCozinha(i))) // só pedidos com itens para cozinha
      .sort((a,b)=>new Date(a.criado_em)-new Date(b.criado_em));
    document.getElementById('n-'+status).textContent = lista.length;
    const el = document.getElementById('col-'+status);
    if(!lista.length){ el.innerHTML=`<div class="vazio">Nenhum pedido</div>`; return; }
    el.innerHTML = lista.map(p=>`
      <div class="card">
        <div class="cn">#${p.numero}</div>
        <div class="cm">${p.mesa} · ${new Date(p.criado_em).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'})}</div>
        <ul class="itens">${(p.itens||[]).filter(i=>_vaiCozinha(i)).map(i=>`<li><span class="qtd">${i.qtd}x</span>${i.nome}${i.obs?` <em style="color:#f97316;font-size:11px">(${i.obs})</em>`:''}</li>`).join('')}</ul>
        ${p.status==='pendente'   ?`<button class="btn-acao btn-prep" onclick="mudar(${p.id},'preparando')">🔥 Iniciar preparo</button>`:''}
        ${p.status==='preparando' ?`<button class="btn-acao btn-pron" onclick="mudar(${p.id},'pronto')">✅ Marcar pronto</button>`:''}
        ${p.status==='pronto'     ?`<button class="btn-acao btn-entr" onclick="mudar(${p.id},'entregue')">📦 Entregue</button>`:''}
      </div>`).join('');
  });
}

async function mudar(id, status){
  await fetch('/api/pedido/status',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({id,status})});
  carregar();
}

_initCardapio().then(()=>{ carregar(); });
setInterval(carregar, 3000);


</script>
</body>
</html>
