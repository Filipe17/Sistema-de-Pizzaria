<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="theme-color" content="#0f172a">
<title>Motoboy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{font-family:-apple-system,'Segoe UI',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px 16px 40px}

.logo{font-size:32px;margin-bottom:6px;text-align:center}
.titulo{font-size:20px;font-weight:900;color:#38bdf8;margin-bottom:4px;text-align:center}
.sub{font-size:13px;color:#64748b;margin-bottom:28px;text-align:center}

/* Card ativo (primeira entrega) */
.card-pedido{background:#1e293b;border:2px solid #334155;border-radius:20px;padding:22px 18px;width:100%;max-width:420px;margin-bottom:16px;transition:opacity .3s}

/* Card bloqueado (aguardando vez) */
.card-bloqueado{background:#111827;border:2px dashed #1e293b;border-radius:20px;padding:18px;width:100%;max-width:420px;margin-bottom:16px;opacity:.7}
.bloq-seq{display:flex;align-items:center;gap:10px}
.bloq-num{background:#1e293b;color:#475569;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:900;flex-shrink:0}
.bloq-info{font-size:13px;color:#475569}
.bloq-info strong{display:block;color:#64748b;font-size:14px}
.bloq-lock{font-size:20px;margin-left:auto;opacity:.4}

/* Card ativo header */
.card-seq{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.seq-num{background:#2563eb;color:#fff;border-radius:50%;width:36px;height:36px;display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:900;flex-shrink:0}
.seq-info{flex:1}
.seq-label{font-size:12px;color:#38bdf8;font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.seq-hora{font-size:13px;color:#94a3b8;margin-top:1px}

.p-nome{font-size:17px;font-weight:800;color:#f1f5f9;margin-bottom:6px}
.p-end{font-size:13px;color:#94a3b8;margin-bottom:4px;display:flex;align-items:flex-start;gap:6px}
.p-tel{font-size:13px;color:#94a3b8;margin-bottom:12px;display:flex;align-items:center;gap:6px}
.p-itens{font-size:12px;color:#64748b;margin-bottom:14px;background:#0f172a;border-radius:10px;padding:10px}
.p-total{font-size:18px;font-weight:900;color:#fbbf24;margin-bottom:16px}

.btn-entregar{width:100%;background:#16a34a;color:#fff;border:none;border-radius:16px;padding:18px;font:inherit;font-size:17px;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:transform .1s,background .2s}
.btn-entregar:active{transform:scale(.97)}
.btn-entregar:disabled{background:#334155;color:#64748b;cursor:default}

.btn-mapa{width:100%;background:#1d4ed8;color:#fff;border:none;border-radius:14px;padding:12px;font:inherit;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:7px}
.btn-gps{width:100%;background:#0f766e;color:#fff;border:none;border-radius:14px;padding:12px;font:inherit;font-size:14px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:12px}

.vazio{text-align:center;padding:40px 20px;color:#475569}
.vazio .icon{font-size:48px;margin-bottom:12px}

.card-msg{background:#1e293b;border:1px solid #334155;border-radius:16px;padding:18px;width:100%;max-width:420px;margin-bottom:16px}
.msg-titulo{font-size:14px;font-weight:700;color:#38bdf8;margin-bottom:12px}
textarea{width:100%;background:#0f172a;border:1.5px solid #334155;border-radius:10px;padding:12px;font:inherit;font-size:14px;color:#f1f5f9;resize:none;outline:none;min-height:80px}
textarea:focus{border-color:#38bdf8}
.btn-msg{background:#0ea5e9;color:#fff;border:none;border-radius:10px;padding:10px 20px;font:inherit;font-size:14px;font-weight:700;cursor:pointer;margin-top:10px;width:100%}

.refresh{font-size:11px;color:#475569;text-align:center;margin-top:8px}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#38bdf8;margin-right:4px;animation:blink 1.5s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#16a34a;color:#fff;border-radius:12px;padding:12px 24px;font-size:14px;font-weight:700;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap;z-index:9999}
.toast.on{opacity:1}

/* Painel do mapa */
#painelMapa{position:fixed;top:0;left:0;right:0;bottom:0;background:#0f172a;z-index:1000;display:none;flex-direction:column}
#painelMapa.on{display:flex}
.mapa-header{background:#1e293b;padding:14px 16px;display:flex;align-items:center;gap:12px;border-bottom:1px solid #334155;flex-shrink:0}
.mapa-btn-voltar{background:#334155;color:#f1f5f9;border:none;border-radius:10px;padding:8px 14px;font:inherit;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
.mapa-info{font-size:13px;color:#94a3b8;flex:1;overflow:hidden}
.mapa-info strong{display:block;color:#f1f5f9;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
#mapaFrame{flex:1;border:none;width:100%}
</style>

<script>
// ── Bloqueia F5 e Ctrl+R (atualização de página) ──
(function(){
  document.addEventListener('keydown', function(e){
    const f5    = e.key === 'F5';
    const ctrlR = (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'r';
    if(f5 || ctrlR){ e.preventDefault(); e.stopPropagation(); }
  }, true);
  window.addEventListener('beforeunload', function(e){
    e.preventDefault(); e.returnValue = '';
  });
})();
</script>
</head>
<body>

<div class="logo">🛵</div>
<div class="titulo">Painel do Motoboy</div>
<div class="sub">Finalize cada entrega para liberar a próxima</div>

<div id="listaPedidos" style="width:100%;max-width:420px">
  <div class="vazio"><div class="icon">⏳</div>Carregando pedidos...</div>
</div>

<div class="card-msg">
  <div class="msg-titulo">💬 Enviar mensagem para o cliente</div>
  <div id="msgAvisoSemEntrega" style="font-size:12px;color:#f59e0b;margin-bottom:8px;display:none">⚠️ Nenhuma entrega ativa. Inicie uma entrega para enviar mensagens.</div>
  <textarea id="msgTexto" placeholder="Ex: Trânsito intenso, vou atrasar uns 10 minutos..." maxlength="300" onkeydown="if(event.ctrlKey&&event.key==='Enter')enviarMensagem()"></textarea>
  <button class="btn-msg" id="btnEnviarMsg" onclick="enviarMensagem()">📨 Enviar</button>
</div>

<div class="refresh"><span class="dot"></span>Atualizando automaticamente</div>
<div class="toast" id="toast"></div>

<!-- Painel do mapa -->
<div id="painelMapa">
  <div class="mapa-header">
    <button class="mapa-btn-voltar" onclick="fecharMapa()">← Voltar</button>
    <div class="mapa-info">
      <strong id="mapaCliente"></strong>
      <span id="mapaEndereco"></span>
    </div>
  </div>
  <iframe id="mapaFrame" src="" allowfullscreen loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
</div>

<script>
const IP   = window.IP   || location.hostname;
const PORT = window.PORT || 5000;
const BASE = (location.protocol === 'https:' || location.port === '' || location.port === '443' || location.port === '80')
  ? location.origin
  : 'http://' + IP + ':' + PORT;
let pedidoAtivoNumero = '';

function fr(v){ return Number(v||0).toFixed(2).replace('.',','); }

function showToast(msg, cor){
  var t = document.getElementById('toast');
  t.textContent = msg;
  t.style.background = cor || '#16a34a';
  t.classList.add('on');
  setTimeout(function(){ t.classList.remove('on'); }, 2500);
}

function renderPedidos(pedidos){
  var lista = document.getElementById('listaPedidos');
  var btnEnviar = document.getElementById('btnEnviarMsg');
  var aviso = document.getElementById('msgAvisoSemEntrega');

  if(!pedidos.length){
    lista.innerHTML = '<div class="vazio"><div class="icon">✅</div><div style="font-size:16px;font-weight:700;color:#4ade80;margin-bottom:6px">Tudo entregue!</div><div>Nenhuma entrega pendente.</div></div>';
    // Sem entrega ativa: desabilita envio
    if(btnEnviar){ btnEnviar.disabled = true; btnEnviar.style.opacity='.4'; }
    if(aviso){ aviso.style.display='block'; }
    return;
  }

  // Tem entrega ativa: habilita envio
  if(btnEnviar){ btnEnviar.disabled = false; btnEnviar.style.opacity='1'; }
  if(aviso){ aviso.style.display='none'; }

  var html = '';

  pedidos.forEach(function(p, idx){
    var obs   = p.observacao || '';
    var endM  = obs.match(/End:\s*([^|]+)/);
    var telM  = obs.match(/Tel:\s*([^|]+)/);
    var nomeM = obs.match(/Cliente:\s*([^|]+)/);
    var itens = (p.itens||[]).map(function(i){ return i.qtd+'× '+i.nome; }).join('<br>');
    var seq   = idx + 1;
    var end   = endM ? endM[1].trim() : '';
    var cli   = nomeM ? nomeM[1].trim() : 'Cliente';
    var hora  = (p.criado_em||'').substring(11,16);

    if(idx === 0){
      // ── PRIMEIRA ENTREGA: totalmente visível e ativa ──
      var endEnc = end.replace(/'/g,"\\'");
      var cliEnc = cli.replace(/'/g,"\\'");

      var btnMapa = end
        ? '<button class="btn-mapa" onclick="abrirMapa(\''+endEnc+'\',\''+cliEnc+'\','+seq+')">🗺️ Ver rota — '+seq+'ª entrega</button>' +
          '<button class="btn-gps"  onclick="abrirGPS(\''+endEnc+'\')">🧭 Navegar GPS</button>'
        : '';

      html += '<div class="card-pedido">' +
        '<div class="card-seq">' +
          '<div class="seq-num">'+seq+'º</div>' +
          '<div class="seq-info">' +
            '<div class="seq-label">🟢 Entregar agora</div>' +
            '<div class="seq-hora">Pedido #'+p.numero+(hora ? ' · saiu às '+hora : '')+'</div>' +
          '</div>' +
        '</div>' +
        '<div class="p-nome">👤 '+cli+'</div>' +
        (end ? '<div class="p-end"><span>📍</span><span>'+end+'</span></div>' : '') +
        (telM ? '<div class="p-tel">📞 '+telM[1].trim()+'</div>' : '') +
        '<div class="p-itens">'+(itens||'—')+'</div>' +
        '<div class="p-total">R$ '+fr(p.total)+'</div>' +
        btnMapa +
                '<button style="width:100%;background:#d97706;color:#fff;border:none;border-radius:14px;padding:13px;font:inherit;font-size:15px;font-weight:800;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;margin-bottom:8px" onclick="marcarChegada()">🚪 Cheguei — Estou na porta</button>' +
                '<button class="btn-entregar" onclick="marcarEntregue('+p.id+',this)">📦 Confirmar Entregue</button>' +
      '</div>';

    } else {
      // ── PRÓXIMAS ENTREGAS: bloqueadas, sem endereço visível ──
      html += '<div class="card-bloqueado">' +
        '<div class="bloq-seq">' +
          '<div class="bloq-num">'+seq+'º</div>' +
          '<div class="bloq-info">' +
            '<strong>👤 '+cli+'</strong>' +
            '<span>Aguardando finalizar a '+idx+'ª entrega</span>' +
          '</div>' +
          '<div class="bloq-lock">🔒</div>' +
        '</div>' +
      '</div>';
    }
  });

  lista.innerHTML = html;
}

async function carregar(){
  try{
    var r = await fetch(BASE+'/api/pedidos');
    var todos = await r.json();
    var delivery = todos.filter(function(p){
      return p.status === 'saiu' && p.mesa && p.mesa.includes('Delivery');
    });
    delivery.sort(function(a,b){ return new Date(a.criado_em) - new Date(b.criado_em); });
    if(delivery.length) pedidoAtivoNumero = delivery[0].numero;
    window._numAtivo = delivery.length ? delivery[0].numero : '';
    renderPedidos(delivery);
  }catch(e){
    document.getElementById('listaPedidos').innerHTML='<div class="vazio"><div class="icon">⚠️</div>Erro ao carregar pedidos.</div>';
  }
}

async function marcarEntregue(id, btn){
  if(!confirm('Confirmar entrega?')) return;
  btn.disabled = true;
  btn.textContent = '⏳ Confirmando...';
  try{
    var r = await fetch(BASE+'/api/pedido/status',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({id:id, status:'entregue'})
    });
    var d = await r.json();
    if(d.ok){
      showToast('✅ Entrega confirmada! Próxima liberada.');
      setTimeout(carregar, 800);
    } else {
      btn.disabled=false; btn.textContent='📦 Confirmar Entregue';
      showToast('Erro ao confirmar','#dc2626');
    }
  }catch(e){
    btn.disabled=false; btn.textContent='📦 Confirmar Entregue';
    showToast('Erro de conexão','#dc2626');
  }
}

async function enviarMensagem(){
  var msg = document.getElementById('msgTexto').value.trim();
  if(!msg){ alert('Escreva uma mensagem.'); return; }
  if(!pedidoAtivoNumero){ showToast('Nenhuma entrega ativa','#f59e0b'); return; }
  try{
    var r = await fetch(BASE+'/api/mensagens-motoboy/nova',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        pedido_numero: pedidoAtivoNumero,
        pedido_itens: '',
        mensagem: msg,
        nome_cliente: '🛵 Motoboy'
      })
    });
    if(!r.ok){ showToast('Erro ao enviar ('+r.status+')','#dc2626'); return; }
    var d = await r.json();
    if(d.ok){
      document.getElementById('msgTexto').value='';
      showToast('✅ Mensagem enviada para o cliente!');
    } else {
      showToast('Erro: '+(d.erro||'falha ao salvar'),'#dc2626');
    }
  }catch(e){ showToast('Erro de conexão','#dc2626'); }
}

function abrirMapa(endereco, cliente, seq){
  var enc = encodeURIComponent(endereco);
  document.getElementById('mapaFrame').src = 'https://maps.google.com/maps?q='+enc+'&output=embed&hl=pt-BR';
  document.getElementById('mapaCliente').textContent = seq+'ª Entrega — '+cliente;
  document.getElementById('mapaEndereco').textContent = endereco;
  document.getElementById('painelMapa').classList.add('on');
}

function fecharMapa(){
  document.getElementById('painelMapa').classList.remove('on');
  document.getElementById('mapaFrame').src = '';
}

function abrirGPS(endereco){
  var enc = encodeURIComponent(endereco);
  window.open('https://www.google.com/maps/dir/?api=1&destination='+enc+'&travelmode=driving&dir_action=navigate','_blank');
}

async function marcarChegada(){
  var pedidoNum = window._numAtivo || pedidoAtivoNumero;
  if(!pedidoNum){ showToast('Pedido não identificado','#f59e0b'); return; }
  try{
    var r = await fetch(BASE+'/api/mensagens-motoboy/nova',{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        pedido_numero: pedidoNum,
        pedido_itens: '',
        mensagem: '🚪__CHEGOU__',
        nome_cliente: '🛵 Motoboy'
      })
    });
    if(!r.ok){ showToast('Erro ao notificar ('+r.status+')','#dc2626'); return; }
    var d = await r.json();
    if(d.ok) showToast('✅ Cliente notificado!','#d97706');
    else showToast('Erro: '+(d.erro||'falha'),'#dc2626');
  }catch(e){ showToast('Erro de conexão','#dc2626'); }
}

carregar();
setInterval(carregar, 5000);
</script>
</body>
</html>
