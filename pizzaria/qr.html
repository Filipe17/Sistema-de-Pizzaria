<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>QR Codes das Mesas</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --vm: #D62828;
    --bg: #f5f0eb;
    --txt: #2d1200;
    --card: #fff;
    --muted: #6b7280;
  }
  body { font-family: -apple-system, 'Segoe UI', sans-serif; background: var(--bg); color: var(--txt); transition: background .3s, color .3s; }

  header {
    background: var(--vm);
    color: #fff;
    padding: 14px 24px;
    display: flex; align-items: center; justify-content: space-between; gap: 12px; flex-wrap: wrap;
    transition: background .3s;
  }
  header h1 { font-size: 18px; font-weight: 900; }
  .header-btns { display: flex; gap: 8px; }
  .btn-impr {
    background: rgba(255,255,255,.2); color: #fff; border: 1.5px solid rgba(255,255,255,.35);
    border-radius: 8px; padding: 8px 16px; font: inherit; font-size: 13px; font-weight: 700; cursor: pointer;
    transition: background .15s;
  }
  .btn-impr:hover { background: rgba(255,255,255,.3); }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
    gap: 16px; padding: 20px;
  }
  .qr-card {
    background: var(--card);
    border-radius: 14px;
    padding: 18px 14px 14px;
    text-align: center;
    box-shadow: 0 2px 8px rgba(0,0,0,.08);
    border: 1.5px solid rgba(0,0,0,.06);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    transition: background .3s;
  }
  .qr-card h3 { font-size: 16px; font-weight: 900; color: var(--txt); }
  .qr-card img { width: 180px; height: 180px; border-radius: 6px; image-rendering: pixelated; }
  .qr-dica {
    font-size: 11px; color: var(--vm); background: rgba(0,0,0,.04);
    border-radius: 6px; padding: 4px 8px; font-weight: 700;
  }
  .qr-url { font-size: 9px; color: #b0a090; word-break: break-all; line-height: 1.4; }
  .sem-mesas { grid-column: 1/-1; text-align: center; padding: 48px 24px; color: var(--muted); }
  .sem-mesas b { display: block; font-size: 16px; margin-bottom: 8px; }

  @media print {
    header { display: none; }
    body { background: #fff; }
    .grid { grid-template-columns: repeat(4,1fr); gap: 10px; padding: 8px; }
    .qr-card { box-shadow: none; border: 1px solid #ddd; border-radius: 8px; padding: 12px 10px; break-inside: avoid; }
    .qr-card img { width: 160px; height: 160px; }
  }
</style>

<script>
// ── Bloqueia F5 e Ctrl+R (atualização de página) ──
(function(){
  document.addEventListener('keydown', function(e){
    const f5    = e.key === 'F5';
    const ctrlR = (e.ctrlKey || e.metaKey) && e.key.toLowerCase() === 'r';
    if(f5 || ctrlR){ e.preventDefault(); e.stopPropagation(); }
  }, true);
  window.addEventListener('beforeunload', function(e){
    e.preventDefault(); e.returnValue = '';
  });
})();
</script>
</head>
<body>
<header>
  <h1>📱 QR Codes das Mesas</h1>
  <div class="header-btns">
    <button class="btn-impr" onclick="window.print()">🖨️ Imprimir tudo</button>
    <button class="btn-impr" onclick="window.close()">← Fechar</button>
  </div>
</header>

<div class="grid" id="grid">
  <div style="grid-column:1/-1;text-align:center;padding:40px;color:#aaa">Carregando mesas...</div>
</div>

<script>
const IP   = window.IP   || location.hostname;
const PORT = window.PORT || 5000;
const NOME = window.NOME || 'Pizzaria';
const BASE = (location.protocol === 'https:' || location.port === '' || location.port === '443' || location.port === '80')
  ? location.origin
  : 'http://' + IP + ':' + PORT;

document.title = 'QR Codes — ' + NOME;

// ── Sincroniza paleta e mesas do admin a cada 1 segundo ──
let _ultimaPaleta = null;
let _ultimasMesas = null;

function aplicarPaletaQR(cfg){
  if(!cfg.paleta_primary) return;
  const r = document.documentElement.style;
  r.setProperty('--vm',  cfg.paleta_primary);
  r.setProperty('--bg',  cfg.paleta_bg || '#f5f0eb');
  r.setProperty('--txt', cfg.paleta_text || '#2d1200');
  document.body.style.background = cfg.paleta_bg || '#f5f0eb';
  document.body.style.color      = cfg.paleta_text || '#2d1200';
  // Atualiza header e dicas com nova cor
  document.querySelectorAll('header').forEach(el => el.style.background = cfg.paleta_primary);
  document.querySelectorAll('.qr-dica').forEach(el => el.style.color = cfg.paleta_primary);
  document.querySelectorAll('.qr-card h3').forEach(el => el.style.color = cfg.paleta_text || '#2d1200');
}

async function sincronizarQR(){
  try{
    const r = await fetch(BASE + '/api/config');
    if(!r.ok) return;
    const cfg = await r.json();

    // Atualiza cores se mudou
    if(cfg.paleta_primary !== _ultimaPaleta){
      _ultimaPaleta = cfg.paleta_primary;
      aplicarPaletaQR(cfg);
    }

    // Recarrega mesas se quantidade ou balcão mudou
    const chave = (cfg.mesas || '0') + '|' + (cfg.balcao || '0');
    if(_ultimasMesas !== null && chave !== _ultimasMesas){
      _ultimasMesas = chave;
      async function carregarComanda(mesa){
  const elId = 'comanda-' + encodeURIComponent(mesa);
  const el   = document.getElementById(elId);
  if(!el) return;
  try{
    const r   = await fetch(BASE + '/api/comanda?mesa=' + encodeURIComponent(mesa));
    const cmd = await r.json();
    if(cmd && cmd.numero){
      el.innerHTML = '🎫 Comanda: <b style="font-size:18px;letter-spacing:2px;color:var(--vm)">' + cmd.numero + '</b>';
    } else {
      el.innerHTML = '<span style="color:#9ca3af;font-size:11px">Sem comanda aberta</span>';
    }
  }catch(e){
    el.innerHTML = '<span style="color:#9ca3af;font-size:11px">—</span>';
  }
}

carregarMesas();
    }
  }catch(e){}
}
setInterval(sincronizarQR, 1000);

async function carregarMesas(){
  const grid = document.getElementById('grid');
  let mesas = [];

  try {
    const r   = await fetch(BASE + '/api/config');
    const cfg = await r.json();
    const qtd    = parseInt(cfg.mesas) || 0;
    const balcao = cfg.balcao === '1';
    aplicarPaletaQR(cfg);
    for(let i = 1; i <= qtd; i++) mesas.push('Mesa ' + i);
    if(balcao) mesas.push('Balcão');
    _ultimasMesas = cfg.mesas + '|' + cfg.balcao;
  } catch(e) {
    grid.innerHTML = '<div class="sem-mesas"><b>⚠️ Erro ao carregar</b>Verifique se o servidor está rodando.</div>';
    return;
  }

  if(!mesas.length){
    grid.innerHTML = '<div class="sem-mesas">'
      + '<b>Nenhuma mesa configurada</b>'
      + '<span>Acesse <b>Admin → ⚙️ Config</b> e informe o número de mesas.</span>'
      + '</div>';
    return;
  }

  grid.innerHTML = '';
  mesas.forEach(mesa => {
    const urlPedido = BASE + '/pedido/mesa/' + encodeURIComponent(mesa);
    const urlQR     = BASE + '/api/qr/'      + encodeURIComponent(mesa);
    const card = document.createElement('div');
    card.className = 'qr-card';
    card.setAttribute('data-mesa', mesa);
    card.innerHTML =
      '<h3>' + mesa + '</h3>' +
      '<img src="' + urlQR + '" alt="QR ' + mesa + '" loading="lazy">' +
      '<div class="qr-dica">📱 Aponte a câmera para pedir</div>' +
      '<div id="comanda-' + encodeURIComponent(mesa) + '" style="margin-top:4px;font-size:13px;font-weight:700;color:#6b7280">🔄 Carregando comanda...</div>' +
      '<div class="qr-url">' + urlPedido + '</div>';
    grid.appendChild(card);
    // Carrega comanda da mesa
    carregarComanda(mesa);
  });
}

async function carregarComanda(mesa){
  const elId = 'comanda-' + encodeURIComponent(mesa);
  const el   = document.getElementById(elId);
  if(!el) return;
  try{
    const r   = await fetch(BASE + '/api/comanda?mesa=' + encodeURIComponent(mesa));
    const cmd = await r.json();
    if(cmd && cmd.numero){
      el.innerHTML = '🎫 Comanda: <b style="font-size:18px;letter-spacing:2px;color:var(--vm)">' + cmd.numero + '</b>';
    } else {
      el.innerHTML = '<span style="color:#9ca3af;font-size:11px">Sem comanda aberta</span>';
    }
  }catch(e){
    el.innerHTML = '<span style="color:#9ca3af;font-size:11px">—</span>';
  }
}

carregarMesas();
</script>
</body>
</html>
